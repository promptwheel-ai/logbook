name: ci
on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20]
        include:
          - os: ubuntu-latest
            node: 18
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: git config --global user.email ci@test && git config --global user.name ci
      - run: npm test
      # MCP behavioral test against THIS commit's core (.. installs the
      # workspace package over the registry pin)
      - run: npm i --no-save --no-audit --no-fund ..
        working-directory: mcp
      - run: npm test
        working-directory: mcp
